services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fii_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/fii_db
    depends_on:
      - db
    ports:
      - "8000:8000"
